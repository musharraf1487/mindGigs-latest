name: Deploy to SiteGround

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_FUNCTIONS_URL: ${{ secrets.VITE_FUNCTIONS_URL }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Package build
        # A single archive avoids the multi-file glob upload silently dropping
        # the large JS bundle (observed: small files like CSS/favicon made it
        # over but the ~1.3MB JS bundle didn't, even though the step reported
        # success) — one file transfer is far more reliable than many.
        run: tar -czf dist.tar.gz -C dist .

      - name: Clean public_html
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 18765
          script: |
            rm -rf /home/u2515-rp4l0byu3ngk/www/mindgigs.com/public_html/*

      - name: Upload build archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 18765
          source: "dist.tar.gz"
          target: "/home/u2515-rp4l0byu3ngk/www/mindgigs.com/"

      - name: Extract build archive
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 18765
          script: |
            cd /home/u2515-rp4l0byu3ngk/www/mindgigs.com
            tar -xzf dist.tar.gz -C public_html
            rm -f dist.tar.gz
